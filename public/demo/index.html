<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NEXIS FOLIO — Every asset you own, in one place</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html { background: var(--bg); scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }
  ::selection { background: color-mix(in oklab, var(--ink) 14%, transparent); }
  a { color: inherit; text-decoration: none; }
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }
  input:focus { outline: 2px solid color-mix(in oklab, var(--ink) 30%, transparent); outline-offset: -1px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="landing-app.jsx"></script>
</head>
<body>
<div id="root"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#15171A"/>
    <circle cx="50" cy="50" r="26" fill="none" stroke="#FAFAFB" stroke-width="5"/>
    <circle cx="50" cy="50" r="7" fill="#FAFAFB"/>
  </svg>
</template>
<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.NestWatch));
</script>
</body>
</html>
